services:
  deriv-bot:
    build: .
    restart: unless-stopped
    environment:
      DERIV_TOKEN: ${DERIV_TOKEN}
      DERIV_APP_ID: ${DERIV_APP_ID}
      SYMBOL: ${SYMBOL:-R_100}
      Z_THRESHOLD: ${Z_THRESHOLD:-3.5}
      EXPIRY_MIN: ${EXPIRY_MIN:-1}
      STAKE: ${STAKE:-1.0}
      STOP_LOSS_DAY: ${STOP_LOSS_DAY:-20.0}
      STOP_WIN_DAY: ${STOP_WIN_DAY:-50.0}
    volumes:
      - deriv_data:/data
volumes:
  deriv_data:
